
pcm_slave.esq_green {
    pcm "hw:0,0"
    rate 48000
}

pcm.ensoniq1 {
    type plug
    slave "esq_green"
}

pcm_slave.usb_beh {
    pcm "hw:1,0"
    rate 48000
}

pcm.usb1 {
    type plug
    slave "usb_beh"
}

pcm_slave.usb_ab13x {
    pcm "hw:2,0"
    rate 48000
}

pcm.usb2 {
    type plug
    slave "usb_ab13x"
}

pcm.composite {
    type multi
    slaves.a.pcm "ensoniq1"
    slaves.a.channels 1
    slaves.b.pcm "usb1"
    slaves.b.channels 2
    slaves.c.pcm "usb2"
    slaves.c.channels 2
    bindings.0.slave a
    bindings.0.channel 0
    bindings.1.slave b
    bindings.1.channel 0 
    bindings.2.slave b
    bindings.2.channel 1
    bindings.3.slave c
    bindings.3.channel 0 
    bindings.4.slave c
    bindings.4.channel 1
}


pcm.multiroute {
    type route
    slave.pcm "composite"
    slave.channels 5
    ttable.0.0 1
    ttable.1.1 1
    ttable.2.2 1
    ttable.3.3 1
    ttable.4.4 1
}


pcm.randomatones {
    type plug
    slave.pcm "composite"
}
